<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | 復縁屋さん</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="min-h-screen bg-[#FFE4E1] flex items-center justify-center p-4 text-gray-800">

<div class="w-full max-w-md mx-auto mb-8 animate-fadeIn">
    <div class="bg-white rounded-[2rem] border-4 border-pink-300 shadow-[0_12px_0_rgb(249,168,212)] overflow-visible relative">

        <!-- 送信アイコン -->
        <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-white p-3 rounded-full border-4 border-pink-300 shadow-[0_4px_0_rgb(249,168,212)] z-20">
            <div class="bg-pink-100 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-pink-500 ml-1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </div>
        </div>

        <!-- ヘッダー -->
        <div class="pt-16 pb-8 px-6 text-center rounded-t-[1.75rem]" style="background-image:url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNGRkI2QzEiIGZpbGwtb3BhY2l0eT0iMC4xNSIvPjwvc3ZnPg==')">
            <h1 class="text-2xl font-black text-gray-800 mb-4 leading-tight flex flex-col items-center gap-2">
                <span class="text-pink-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
                </span>
                <span class="underline decoration-pink-400 decoration-[4px] underline-offset-[6px]">送信が完了しました</span>
            </h1>
            <div class="mt-6">
                <p class="text-gray-700 font-bold text-sm leading-relaxed bg-white/90 inline-block px-5 py-3 rounded-xl border border-pink-100 shadow-sm">
                    無料相談のお申し込み、<br>
                    誠にありがとうございます！
                </p>
            </div>
        </div>

        <!-- 詳細案内 -->
        <div class="px-5 pb-10 bg-white rounded-b-[1.75rem]">

            <div class="bg-pink-50/80 p-5 rounded-2xl border-2 border-pink-100 shadow-inner mb-8">
                <div class="flex items-center gap-2 mb-3 text-pink-600 font-black justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>
                    <span>これからの流れ</span>
                </div>
                <p class="text-sm text-gray-600 font-bold leading-relaxed text-center mb-4">
                    ご入力いただいた内容を確認し、<br>
                    専門のカウンセラーより<br>
                    順次ご連絡させていただきます。
                </p>
                <div class="bg-white p-3 rounded-xl border border-pink-100 text-xs font-bold text-gray-500 text-center shadow-sm">
                    <span class="text-pink-500 font-black">お約束</span><br>
                    ご相談内容は秘密厳守で管理しております。<br>
                    どうぞご安心してお待ちください。
                </div>
            </div>

            <!-- 戻るボタン -->
            <div class="flex justify-center">
                <a href="./index.html" class="inline-flex items-center justify-center gap-2 w-full bg-gray-50 text-gray-600 font-black text-sm py-4 px-8 rounded-2xl shadow-[0_6px_0_rgb(229,231,235)] hover:-translate-y-1 hover:shadow-[0_8px_0_rgb(229,231,235)] active:translate-y-2 active:shadow-none transition-all border-4 border-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    トップページへ戻る
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
